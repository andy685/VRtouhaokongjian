<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>销售-选择会员-模糊搜索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 10px;
      background: rgba(26, 26, 46, 0.9);
      color: #fff;
      font-size: 14px;
      z-index: 1000;
    }
    .page-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .page-meta {
      font-size: 12px;
      color: #888;
    }
    .figma-frame {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      transform-origin: top center;
    }
    .figma-frame > div,
    .figma-frame > span {
      position: absolute;
    }
    @media (max-width: 768px) {
      body { padding: 50px 10px 10px; }
      .page-header { padding: 8px; }
      .page-title { font-size: 14px; }
      .page-meta { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="page-title">销售-选择会员-模糊搜索</div>
    <div class="page-meta">原始尺寸: 2560 × 1440px</div>
  </div>
  <div class="figma-frame" id="figmaFrame">

  </div>
  <script>
    (function() {
      const frame = document.getElementById('figmaFrame');
      const header = document.querySelector('.page-header');
      
      function resize() {
        const headerHeight = header ? header.offsetHeight : 40;
        const availableHeight = window.innerHeight - headerHeight - 40;
        const availableWidth = window.innerWidth - 40;
        
        const frameWidth = 1920;
        const frameHeight = 1080;
        
        // 计算缩放比例，取宽高限制中较小的
        const scaleX = availableWidth / frameWidth;
        const scaleY = availableHeight / frameHeight;
        const scale = Math.min(scaleX, scaleY, 1); // 不放大，只缩小
        
        frame.style.transform = 'scale(' + scale + ')';
        frame.style.marginTop = (headerHeight + 20) + 'px';
      }
      
      resize();
      window.addEventListener('resize', resize);
    })();
  </script>
</body>
</html>
