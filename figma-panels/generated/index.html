<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC收银系统 - 设计稿预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      padding: 40px;
    }
    h1 {
      text-align: center;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .card-preview {
      background: #2a2a4e;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #666;
    }
    .card-info {
      padding: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-size {
      font-size: 12px;
      color: #888;
    }
    .category {
      max-width: 1400px;
      margin: 40px auto 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
      font-size: 18px;
      font-weight: 600;
      color: #4a9eff;
    }
    .category:first-of-type {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>PC收银系统</h1>
  <p class="subtitle">共 58 个页面 · 基于 Figma 设计稿自动生成</p>
  
  <div class="grid" id="pages"></div>
  
  <script>
    const pages = [
      // 销售模块
      { name: '销售-未注册会员-直接结算', file: '销售-未注册会员-直接结算.html', category: '销售' },
      { name: '销售-选择会员-模糊搜索', file: '销售-选择会员-模糊搜索.html', category: '销售' },
      { name: '销售-选择会员-点击刷卡', file: '销售-选择会员-点击刷卡.html', category: '销售' },
      { name: '销售-单次消费-选择优惠券', file: '销售-单次消费-选择优惠券.html', category: '销售' },
      { name: '销售-新增会员', file: '销售-新增会员.html', category: '销售' },
      { name: '销售-单次消费-有订单', file: '销售-单次消费-有订单.html', category: '销售' },
      { name: '销售-套票', file: '销售-套票.html', category: '销售' },
      { name: '销售-商品', file: '销售-商品.html', category: '销售' },
      { name: '销售-单次消费-无订单', file: '销售-单次消费-无订单.html', category: '销售' },
      { name: '销售-充值活动', file: '销售-充值活动.html', category: '销售' },
      { name: '消费-结算-现金', file: '消费-结算-现金.html', category: '销售' },
      { name: '结算-线下支付宝-微信', file: '结算-线下支付宝-微信.html', category: '销售' },
      // 会员模块
      { name: '会员', file: '会员.html', category: '会员' },
      { name: '会员-会员详情', file: '会员-会员详情.html', category: '会员' },
      { name: '会员扣费', file: '会员扣费.html', category: '会员' },
      { name: '会员扣费-选择设备', file: '会员扣费-选择设备.html', category: '会员' },
      { name: '选择会员', file: '选择会员.html', category: '会员' },
      { name: '会员明细-预存记录', file: '会员明细-预存记录.html', category: '会员' },
      { name: '会员明细-游戏记录', file: '会员明细-游戏记录.html', category: '会员' },
      { name: '会员明细-套票记录', file: '会员明细-套票记录.html', category: '会员' },
      { name: '会员明细-预存次数记录', file: '会员明细-预存次数记录.html', category: '会员' },
      // 结算模块
      { name: '结算-现金', file: '结算-现金.html', category: '结算' },
      { name: '充值成功', file: '充值成功.html', category: '结算' },
      { name: '扣费成功', file: '扣费成功.html', category: '结算' },
      // 订单模块
      { name: '订单', file: '订单.html', category: '订单' },
      { name: '点播系统订单', file: '点播系统订单.html', category: '订单' },
      { name: '手动扣费订单', file: '手动扣费订单.html', category: '订单' },
      { name: '修改储值订单', file: '修改储值订单.html', category: '订单' },
      { name: '游戏币兑换订单', file: '游戏币兑换订单.html', category: '订单' },
      { name: '活动赠送订单', file: '活动赠送订单.html', category: '订单' },
      // 营收模块
      { name: '营收', file: '营收.html', category: '营收' },
      { name: '营收-按收银员', file: '营收-按收银员.html', category: '营收' },
      { name: '营收-按支付方式', file: '营收-按支付方式.html', category: '营收' },
      // 设置模块
      { name: '系统设置-基础设置', file: '系统设置-基础设置.html', category: '设置' },
      { name: '系统设置-会员设置', file: '系统设置-会员设置.html', category: '设置' },
      { name: '系统设置-员工卡设置', file: '系统设置-员工卡设置.html', category: '设置' },
      // 其他
      { name: '交班结算', file: '交班结算.html', category: '其他' },
      { name: '交班结算-下一步', file: '交班结算-下一步.html', category: '其他' },
      { name: '日志', file: '日志.html', category: '其他' },
      { name: '店员登录', file: '店员登录.html', category: '其他' },
      { name: '升级', file: '升级.html', category: '其他' },
    ];
    
    // 按分类组织
    const categories = {};
    pages.forEach(p => {
      if (!categories[p.category]) categories[p.category] = [];
      categories[p.category].push(p);
    });
    
    // 渲染
    const container = document.getElementById('pages');
    Object.entries(categories).forEach(([cat, items]) => {
      const heading = document.createElement('div');
      heading.className = 'category';
      heading.textContent = cat;
      container.appendChild(heading);
      
      items.forEach(page => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = page.file;
        card.innerHTML = `
          <div class="card-preview">点击预览</div>
          <div class="card-info">
            <div class="card-title">${page.name}</div>
          </div>
        `;
        container.appendChild(card);
      });
    });
  </script>
</body>
</html>
