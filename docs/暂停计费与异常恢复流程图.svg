<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 950" width="1050" height="950">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .stitle { font-size: 15px; font-weight: 600; fill: #111827; }
    .node-text { font-size: 14px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .node-text-s { font-size: 12px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .sub-text { font-size: 12px; fill: #6b7280; text-anchor: middle; dominant-baseline: middle; }
    .label-text { font-size: 12px; fill: #2563eb; text-anchor: middle; }
    .label-text-red { font-size: 12px; fill: #dc2626; text-anchor: middle; }
    .label-text-green { font-size: 12px; fill: #16a34a; text-anchor: middle; }
    .label-text-orange { font-size: 12px; fill: #f97316; text-anchor: middle; }
    .card-title { font-size: 13px; font-weight: 600; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .card-text { font-size: 11px; fill: #4b5563; text-anchor: middle; dominant-baseline: middle; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="1050" height="950" fill="#ffffff"/>
  <text x="350" y="35" class="title" text-anchor="middle">暂停计费流程</text>
  <rect x="200" y="70" width="200" height="50" rx="25" ry="25" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="300" y="90" class="node-text">正常游玩中</text>
  <text x="300" y="108" class="sub-text">[Playing]</text>
  <line x1="300" y1="120" x2="300" y2="155" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <rect x="230" y="125" width="140" height="18" rx="4" fill="#ffffff" fill-opacity="0.95"/>
  <text x="300" y="134" class="label-text-orange">摘盔 (P-Sensor触发)</text>
  <rect x="200" y="165" width="200" height="55" rx="8" ry="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="300" y="186" class="node-text">暂停中 / 不计费</text>
  <text x="300" y="206" class="sub-text">[Paused]</text>
  <rect x="420" y="178" width="100" height="28" rx="4" fill="#fef2c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="470" y="186" class="node-text-s" fill="#92400e">暂停不计费</text>
  <line x1="400" y1="192" x2="415" y2="192" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 200,180 L 120,180 L 120,120 L 145,120" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="55" y="100" width="130" height="40" rx="20" ry="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="118" class="node-text-s" fill="#16a34a">3min内重新佩戴</text>
  <text x="120" y="133" class="node-text-s" fill="#059669" font-size="10">→ 自动恢复计费</text>
  <line x1="300" y1="220" x2="300" y2="270" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="265" y="232" width="80" height="18" rx="4" fill="#ffffff" fill-opacity="0.95"/>
  <text x="305" y="241" class="label-text-red">3分钟超时</text>
  <rect x="180" y="280" width="240" height="50" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="300" class="node-text-s" fill="#dc2626">自动结束 Session</text>
  <text x="300" y="318" class="sub-text" fill="#dc2626">按实际游玩时长结算</text>
  <path d="M 400,192 L 520,192 L 520,300 L 535,300" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="410" y="240" width="100" height="18" rx="4" fill="#ffffff" fill-opacity="0.95"/>
  <text x="460" y="249" class="label-text">主动点击结束</text>
  <rect x="545" y="280" width="200" height="50" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="645" y="300" class="node-text-s">主动点击"结束"</text>
  <text x="645" y="318" class="sub-text">→ 立即结算</text>
  <rect x="180" y="370" width="360" height="36" rx="8" ry="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="392" class="node-text-s" fill="#059669" font-weight="bold">实际付费时长 = actual_duration_sec &#8722; pause_duration_sec</text>
  <line x1="30" y1="430" x2="1020" y2="430" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="350" y="470" class="title" text-anchor="middle">异常恢复策略</text>
  <rect x="70" y="560" width="160" height="55" rx="8" ry="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="150" y="582" class="node-text" fill="#dc2626" font-weight="bold">异常发生</text>
  <text x="150" y="600" class="sub-text" fill="#dc2626">异常类型</text>
  <rect x="500" y="495" width="460" height="60" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="500" y="495" width="6" height="60" rx="3" ry="3" fill="#f97316"/>
  <text x="640" y="513" class="card-title">设备断网 &lt; 3分钟</text>
  <text x="640" y="529" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">处理: </tspan><tspan fill="#111827" font-size="11">继续运行 · 本地缓存操作日志</tspan></text>
  <text x="640" y="545" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">费用: </tspan><tspan fill="#111827" font-size="11">联网后按实际时长结算</tspan>  <tspan fill="#6b7280" font-size="11">感知: </tspan><tspan fill="#111827" font-size="11">无感知 (VR继续运行)</tspan></text>
  <rect x="500" y="570" width="460" height="60" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="500" y="570" width="6" height="60" rx="3" ry="3" fill="#f97316"/>
  <text x="640" y="588" class="card-title">设备断网 &gt; 3分钟</text>
  <text x="640" y="604" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">处理: </tspan><tspan fill="#111827" font-size="11">自动结束 · 标记 offline_ended</tspan></text>
  <text x="640" y="620" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">费用: </tspan><tspan fill="#111827" font-size="11">需后台审核</tspan>  <tspan fill="#6b7280" font-size="11">感知: </tspan><tspan fill="#111827" font-size="11">VR显示 Error 提示</tspan></text>
  <rect x="500" y="645" width="460" height="60" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="500" y="645" width="6" height="60" rx="3" ry="3" fill="#f97316"/>
  <text x="640" y="663" class="card-title">设备断电</text>
  <text x="640" y="679" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">处理: </tspan><tspan fill="#111827" font-size="11">被动消失 · 标记 abnormal_end</tspan></text>
  <text x="640" y="695" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">费用: </tspan><tspan fill="#111827" font-size="11">按最后心跳时间计费</tspan>  <tspan fill="#6b7280" font-size="11">感知: </tspan><tspan fill="#111827" font-size="11">重新上电后显示 Error</tspan></text>
  <rect x="500" y="720" width="460" height="60" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="500" y="720" width="6" height="60" rx="3" ry="3" fill="#f97316"/>
  <text x="640" y="738" class="card-title">设备崩溃</text>
  <text x="640" y="754" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">处理: </tspan><tspan fill="#111827" font-size="11">SDK上报异常 · force_ended</tspan></text>
  <text x="640" y="770" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">费用: </tspan><tspan fill="#111827" font-size="11">全额退费 (用户无过错)</tspan>  <tspan fill="#6b7280" font-size="11">感知: </tspan><tspan fill="#111827" font-size="11">VR显示 Error 提示</tspan></text>
  <rect x="500" y="795" width="460" height="60" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="500" y="795" width="6" height="60" rx="3" ry="3" fill="#f97316"/>
  <text x="640" y="813" class="card-title">游戏进程卡死 (&gt;60s无心跳)</text>
  <text x="640" y="829" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">处理: </tspan><tspan fill="#111827" font-size="11">后端标记 force_stopped</tspan></text>
  <text x="640" y="845" class="card-text" dominant-baseline="middle"><tspan fill="#6b7280" font-size="11">费用: </tspan><tspan fill="#111827" font-size="11">退费50%或全价</tspan>  <tspan fill="#6b7280" font-size="11">感知: </tspan><tspan fill="#111827" font-size="11">VR显示 Error 提示</tspan></text>
  <path d="M 230,587 L 350,587 L 350,525 L 495,525" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 230,587 L 350,587 L 350,600 L 495,600" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 230,587 L 350,587 L 350,675 L 495,675" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 230,587 L 350,587 L 350,750 L 495,750" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 230,587 L 350,587 L 350,825 L 495,825" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <g transform="translate(30, 900)">
    <text x="0" y="0" class="sub-text" text-anchor="start" font-size="11">图例:</text>
    <line x1="0" y1="12" x2="20" y2="12" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="26" y="16" class="sub-text" text-anchor="start">正常恢复</text>
    <line x1="80" y1="12" x2="100" y2="12" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="106" y="16" class="sub-text" text-anchor="start">状态切换</text>
    <line x1="160" y1="12" x2="180" y2="12" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="186" y="16" class="sub-text" text-anchor="start">异常/超时</text>
    <line x1="240" y1="12" x2="260" y2="12" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="266" y="16" class="sub-text" text-anchor="start">用户操作</text>
  </g>
</svg>