<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <rect width="720" height="180" fill="#0f172a" rx="8"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .lbl{fill:#e2e8f0;font-size:11px;font-weight:600}
    .sub{fill:#94a3b8;font-size:9px}
    .ar-lbl{fill:#64748b;font-size:8px}
    .muted{fill:#94a3b8;font-size:9px}
    .accent{fill:#a78bfa;font-size:9px}
    .green{fill:#34d399;font-size:9px}
    .title{fill:#e2e8f0;font-size:13px;font-weight:600}
    .box{fill:#1e293b;stroke:#334155;stroke-width:1;rx:6}
    .box-a{fill:#1e1b4b;stroke:#6366f1;stroke-width:1.5;rx:6}
    .box-g{fill:#064e3b;stroke:#34d399;stroke-width:1.5;rx:6}
    .box-r{fill:#450a0a;stroke:#f87171;stroke-width:1.5;rx:6}
    .box-y{fill:#451a03;stroke:#fb923c;stroke-width:1.5;rx:6}
    .arrow{stroke:#475569;stroke-width:1.5;fill:none;marker-end:url(#a)}
    .arrow-d{stroke:#475569;stroke-width:1;fill:none;stroke-dasharray:4,3;marker-end:url(#a)}
    </style>
  <text x="30" y="25" class="title">PC游戏终端状态流转图 (7个状态)</text>
  <ellipse cx="70" cy="75" rx="38" ry="16" class="box"/><text x="70" y="79" text-anchor="middle" class="lbl">Idle</text>
  <ellipse cx="175" cy="75" rx="42" ry="16" class="box-a"/><text x="175" y="79" text-anchor="middle" class="lbl">GameSelect</text>
  <ellipse cx="300" cy="75" rx="42" ry="16" class="box-y"/><text x="300" y="79" text-anchor="middle" class="lbl">QRPayment</text>
  <ellipse cx="430" cy="75" rx="48" ry="16" class="box-g"/><text x="430" y="79" text-anchor="middle" class="lbl">AssignDevice</text>
  <ellipse cx="560" cy="75" rx="48" ry="16" class="box"/><text x="560" y="79" text-anchor="middle" class="lbl">Playing</text>
  <ellipse cx="680" cy="140" rx="42" ry="16" class="box-y"/><text x="680" y="144" text-anchor="middle" class="lbl">Settlement</text>
  <line x1="108" y1="75" x2="133" y2="75" class="arrow"/>
  <line x1="217" y1="75" x2="258" y2="75" class="arrow"/>
<text x="237.5" y="72.0" text-anchor="middle" class="ar-lbl">选游戏</text>
  <line x1="342" y1="75" x2="382" y2="75" class="arrow"/>
<text x="362.0" y="72.0" text-anchor="middle" class="ar-lbl">支付成功</text>
  <line x1="478" y1="75" x2="512" y2="75" class="arrow"/>
<text x="495.0" y="72.0" text-anchor="middle" class="ar-lbl">佩戴VR</text>
  <line x1="608" y1="85" x2="650" y2="128" class="arrow"/>
<text x="629.0" y="103.5" text-anchor="middle" class="ar-lbl">结束</text>
  <text x="380" y="170" text-anchor="middle" class="muted">Idle→GameSelect→QRPayment→AssignDevice→Playing→Settlement</text>
</svg>