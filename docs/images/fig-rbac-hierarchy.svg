<text x="350.0" y="196.5" text-anchor="middle" class="lbl">L3 门店层 — 日常运营</text>
  <rect x="110" y="185" width="140" height="22" class="box-g"/>
<text x="180.0" y="200.0" text-anchor="middle" class="lbl">店长</text>
  <rect x="280" y="185" width="140" height="22" class="box-a"/>
<text x="350.0" y="200.0" text-anchor="middle" class="lbl">收银员</text>
  <rect x="450" y="185" width="140" height="22" class="box"/>
<text x="520.0" y="200.0" text-anchor="middle" class="lbl">员工</text>
  <rect x="50" y="230" width="600" height="40" class="box"/>
<text x="350.0" y="254.0" text-anchor="middle" class="lbl">L4 终端层</text>
  <text x="200" y="255" class="muted">C端游客(匿名) / C端会员(注册)</text>
  <text x="350" y="310" text-anchor="middle" class="muted">八角色四层级权限体系</text>
</svg>