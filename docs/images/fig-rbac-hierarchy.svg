<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <rect width="700" height="350" fill="#0f172a" rx="8"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .lbl{fill:#e2e8f0;font-size:11px;font-weight:600}
    .sub{fill:#94a3b8;font-size:9px}
    .ar-lbl{fill:#64748b;font-size:8px}
    .muted{fill:#94a3b8;font-size:9px}
    .accent{fill:#a78bfa;font-size:9px}
    .green{fill:#34d399;font-size:9px}
    .title{fill:#e2e8f0;font-size:13px;font-weight:600}
    .box{fill:#1e293b;stroke:#334155;stroke-width:1;rx:6}
    .box-a{fill:#1e1b4b;stroke:#6366f1;stroke-width:1.5;rx:6}
    .box-g{fill:#064e3b;stroke:#34d399;stroke-width:1.5;rx:6}
    .box-r{fill:#450a0a;stroke:#f87171;stroke-width:1.5;rx:6}
    .box-y{fill:#451a03;stroke:#fb923c;stroke-width:1.5;rx:6}
    .arrow{stroke:#475569;stroke-width:1.5;fill:none;marker-end:url(#a)}
    .arrow-d{stroke:#475569;stroke-width:1;fill:none;stroke-dasharray:4,3;marker-end:url(#a)}
    </style>
  <text x="30" y="25" class="title">RBAC角色权限层级图</text>
  <rect x="50" y="40" width="600" height="55" class="box-r"/>
<text x="350.0" y="71.5" text-anchor="middle" class="lbl">L1 平台层 — 全局管控</text>
  <rect x="65" y="65" width="125" height="22" class="box-r"/>
<text x="127.5" y="80.0" text-anchor="middle" class="lbl">超管</text>
  <rect x="205" y="65" width="125" height="22" class="box"/>
<text x="267.5" y="80.0" text-anchor="middle" class="lbl">运营</text>
  <rect x="345" y="65" width="125" height="22" class="box-a"/>
<text x="407.5" y="80.0" text-anchor="middle" class="lbl">财务</text>
  <rect x="485" y="65" width="125" height="22" class="box-g"/>
<text x="547.5" y="80.0" text-anchor="middle" class="lbl">内容</text>
  <rect x="50" y="110" width="600" height="45" class="box-y"/>
<text x="350.0" y="136.5" text-anchor="middle" class="lbl">L2 区域层 — 渠道管理</text>
  <rect x="275" y="125" width="150" height="22" class="box-y"/>
<text x="350.0" y="140.0" text-anchor="middle" class="lbl">代理商管理员</text>
