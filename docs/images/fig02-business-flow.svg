  <rect x="220.0" y="440.0" width="340.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#d1d5db" stroke-width="1.8" filter="url(#glowGreen)"/>
  <text x="390.0" y="475.0" text-anchor="middle" class="node-title">C端消费者</text>
  <text x="390.0" y="497.0" text-anchor="middle" class="node-sub">充值 ｜ 购买游戏项目 ｜ 体验</text>
  <rect x="-21.0" y="-14.0" width="42" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="0.0" y="0.0" text-anchor="middle" class="arrow-label">硬件代理</text>
  <rect x="-24.5" y="-14.0" width="49" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
