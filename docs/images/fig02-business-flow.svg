  <path d="M 0.0,0.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 0.0,0.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 0.0,0.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 0.0,0.0" fill="none" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <path d="M 0.0,0.0" fill="none" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)"/>
