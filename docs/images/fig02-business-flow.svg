  <rect x="-21.0" y="-14.0" width="42" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="0.0" y="0.0" text-anchor="middle" class="arrow-label">交付设备</text>
  <rect x="-24.5" y="-14.0" width="49" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="0.0" y="0.0" text-anchor="middle" class="arrow-label">游戏豆到账</text>
  <rect x="-28.0" y="-14.0" width="56" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="0.0" y="0.0" text-anchor="middle" class="arrow-label">C端付款 ¥</text>
  <rect x="-31.5" y="-14.0" width="63" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="0.0" y="0.0" text-anchor="middle" class="arrow-label">消费 / 充值</text>
  <line x1="42.0" y1="480.0" x2="72.0" y2="480.0" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <text x="82.0" y="484.0" class="legend">资金/商品流</text>
  <line x1="42.0" y1="502.0" x2="72.0" y2="502.0" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <text x="82.0" y="506.0" class="legend">数据/服务流</text>
  <line x1="42.0" y1="524.0" x2="72.0" y2="524.0" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <text x="82.0" y="528.0" class="legend">资金回流</text>
