<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 700" width="750" height="700">
  <rect width="750" height="700" fill="#0f172a" rx="8"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .lbl{fill:#e2e8f0;font-size:11px;font-weight:600}
    .sub{fill:#94a3b8;font-size:9px}
    .ar-lbl{fill:#64748b;font-size:8px}
    .muted{fill:#94a3b8;font-size:9px}
    .accent{fill:#a78bfa;font-size:9px}
    .green{fill:#34d399;font-size:9px}
    .title{fill:#e2e8f0;font-size:13px;font-weight:600}
    .box{fill:#1e293b;stroke:#334155;stroke-width:1;rx:6}
    .box-a{fill:#1e1b4b;stroke:#6366f1;stroke-width:1.5;rx:6}
    .box-g{fill:#064e3b;stroke:#34d399;stroke-width:1.5;rx:6}
    .box-r{fill:#450a0a;stroke:#f87171;stroke-width:1.5;rx:6}
    .box-y{fill:#451a03;stroke:#fb923c;stroke-width:1.5;rx:6}
    .arrow{stroke:#475569;stroke-width:1.5;fill:none;marker-end:url(#a)}
    .arrow-d{stroke:#475569;stroke-width:1;fill:none;stroke-dasharray:4,3;marker-end:url(#a)}
    </style>
  <text x="30" y="30" class="title">用户到店消费全流程</text>
  <rect x="80" y="45" width="590" height="45" class="box"/>
<text x="375.0" y="71.5" text-anchor="middle" class="lbl">到店前/到店/身份识别</text>
<text x="375.0" y="85.5" text-anchor="middle" class="sub">小程序浏览 → 微信扫码登录 → 散客/会员分支</text>
  <line x1="375" y1="90" x2="375" y2="110" class="arrow"/>
  <rect x="80" y="110" width="590" height="40" class="box-a"/>
<text x="375.0" y="134.0" text-anchor="middle" class="lbl">选游戏 · PC终端</text>
<text x="375.0" y="148.0" text-anchor="middle" class="sub">浏览大厅 → 查看详情(视频/价格/难度) → 点击"开始体验"</text>
  <line x1="375" y1="150" x2="375" y2="170" class="arrow"/>
  <rect x="80" y="170" width="590" height="45" class="box-y"/>
<text x="375.0" y="196.5" text-anchor="middle" class="lbl">支付</text>
<text x="375.0" y="210.5" text-anchor="middle" class="sub">扫码 → 微信/支付宝回调 → POST /payment/wechat/notify → 分配设备</text>
  <line x1="375" y1="215" x2="375" y2="235" class="arrow"/>
  <rect x="80" y="235" width="590" height="50" class="box-g"/>
<text x="375.0" y="264.0" text-anchor="middle" class="lbl">分配设备 + 佩戴VR</text>
<text x="375.0" y="278.0" text-anchor="middle" class="sub">PC终端"请佩戴#03头盔" → 后端MQTT launch_game → VR终端自动加载</text>
  <line x1="375" y1="285" x2="375" y2="305" class="arrow"/>
  <rect x="80" y="305" width="590" height="65" class="box-a"/>
<text x="375.0" y="341.5" text-anchor="middle" class="lbl">游戏进行中</text>
<text x="375.0" y="355.5" text-anchor="middle" class="sub">VR: 0 HUD纯沉浸 | SDK: 60s心跳+摘盔暂停(不计费) | PC: 监控面板</text>
  <line x1="375" y1="370" x2="375" y2="390" class="arrow"/>
  <rect x="80" y="390" width="590" height="50" class="box-g"/>
<text x="375.0" y="419.0" text-anchor="middle" class="lbl">结束结算</text>
<text x="375.0" y="433.0" text-anchor="middle" class="sub">SDK endSession → 计算费用 → VR结束提示 → PC完整结算页(明细+评分)</text>
  <line x1="375" y1="440" x2="375" y2="460" class="arrow"/>
  <rect x="80" y="460" width="590" height="40" class="box"/>
<text x="375.0" y="484.0" text-anchor="middle" class="lbl">离店后</text>
<text x="375.0" y="498.0" text-anchor="middle" class="sub">小程序消费记录+积分+邀请 | 商家后台实时营收更新</text>
  <text x="375" y="540" text-anchor="middle" class="muted">到店前→选游戏→支付→分配设备→游戏→结算→离店 完整闭环</text>
</svg>