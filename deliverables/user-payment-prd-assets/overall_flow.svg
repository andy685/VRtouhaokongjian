<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker></defs><rect width="100%" height="100%" fill="#F8FBFF"/><text x="40" y="50" font-family="Arial Unicode MS, Arial" font-size="34" font-weight="700" fill="#0F172A">玩家玩游戏支付主流程</text><rect x="50" y="170" rx="18" ry="18" width="180" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="140.0" y="212.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="140.0" dy="0">1. 到达设备</tspan><tspan x="140.0" dy="26">选择内容 / 设备</tspan></text><rect x="260" y="170" rx="18" ry="18" width="300" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="410.0" y="212.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="410.0" dy="0">2. 触发支付</tspan><tspan x="410.0" dy="26">散客直付 / 会员主动扫码 / 会员码反扫 / 店员扫码</tspan></text><rect x="620" y="170" rx="18" ry="18" width="240" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="740.0" y="212.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="740.0" dy="0">3. 展示支付明细</tspan><tspan x="740.0" dy="26">金额、优惠、支付资产</tspan></text><rect x="915" y="170" rx="18" ry="18" width="210" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="1020.0" y="212.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1020.0" dy="0">4. 确认支付</tspan><tspan x="1020.0" dy="26">扣款 / 外部支付</tspan></text><rect x="1170" y="170" rx="18" ry="18" width="210" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="1275.0" y="212.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1275.0" dy="0">5. 订单创建</tspan><tspan x="1275.0" dy="26">写入支付流水</tspan></text><line x1="230" y1="225" x2="260" y2="225" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="560" y1="225" x2="620" y2="225" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="860" y1="225" x2="915" y2="225" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1125" y1="225" x2="1170" y2="225" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1275" y1="280" x2="1275" y2="350" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1275" y1="350" x2="235" y2="350" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><rect x="663.0" y="318.0" width="184" height="28" rx="8" fill="#DBEAFE" stroke="#93C5FD"/><text x="755.0" y="336.0" font-family="Arial Unicode MS, Arial" font-size="16" text-anchor="middle" fill="#1E3A8A">支付成功后进入设备控制</text><line x1="235" y1="350" x2="235" y2="470" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><rect x="160" y="470" rx="18" ry="18" width="220" height="110" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="270.0" y="525.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="270.0" dy="0">6. 下发开局指令</tspan></text><rect x="430" y="470" rx="18" ry="18" width="220" height="110" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="540.0" y="512.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="540.0" dy="0">7. 设备开局成功</tspan><tspan x="540.0" dy="26">进入游玩中</tspan></text><rect x="735" y="470" rx="18" ry="18" width="220" height="110" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="845.0" y="512.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="845.0" dy="0">8. 游玩结束</tspan><tspan x="845.0" dy="26">回传结束原因</tspan></text><rect x="1015" y="470" rx="18" ry="18" width="280" height="110" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/><text x="1155.0" y="512.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1155.0" dy="0">9. 正常完成 / 异常闭环</tspan><tspan x="1155.0" dy="26">补开局 / 退款 / 复核</tspan></text><line x1="380" y1="525" x2="430" y2="525" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="650" y1="525" x2="735" y2="525" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="955" y1="525" x2="1015" y2="525" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><text x="50" y="720" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">说明：</text><text x="50" y="750" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">• 支付环节以“支付成功、开局成功、结束回传、订单归档”为主链路。</text><text x="50" y="780" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">• 任一环节失败都需要有异常订单记录，并能进入补开局、人工复核或退款流程。</text></svg>