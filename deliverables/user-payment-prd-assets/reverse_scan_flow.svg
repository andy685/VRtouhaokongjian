<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker></defs><rect width="100%" height="100%" fill="#FFFDF8"/><text x="40" y="50" font-family="Arial Unicode MS, Arial" font-size="34" font-weight="700" fill="#0F172A">会员码反扫支付闭环（重点流程）</text><rect x="70" y="120" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="151.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A1. 玩家出示会员码</tspan><tspan x="330.0" dy="26">设备端 / 扫码枪完成反扫</tspan></text><rect x="70" y="238" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="269.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A2. 系统识别会员身份</tspan><tspan x="330.0" dy="26">校验会员状态、会员资产、设备可用性</tspan></text><rect x="70" y="356" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="387.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A3. 小程序展示支付明细</tspan><tspan x="330.0" dy="26">展示扣减资产、补差金额、优惠信息</tspan></text><rect x="70" y="474" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="505.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A4. 玩家确认扣款</tspan><tspan x="330.0" dy="26">进入支付处理中</tspan></text><rect x="70" y="592" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="623.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A5. 扣款成功</tspan><tspan x="330.0" dy="26">生成支付流水与点播订单</tspan></text><rect x="70" y="710" rx="18" ry="18" width="520" height="88" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="330.0" y="741.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="330.0" dy="0">A6. 系统下发开局指令</tspan><tspan x="330.0" dy="26">设备回传开局结果</tspan></text><rect x="820" y="120" rx="18" ry="18" width="550" height="88" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="1095.0" y="151.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B1. 开局成功</tspan><tspan x="1095.0" dy="26">订单状态=进行中，进入游玩阶段</tspan></text><rect x="820" y="238" rx="18" ry="18" width="550" height="88" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="1095.0" y="269.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B2. 正常结束</tspan><tspan x="1095.0" dy="26">回传结束原因=正常完成</tspan></text><rect x="820" y="356" rx="18" ry="18" width="550" height="88" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/><text x="1095.0" y="387.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B3. 订单完结</tspan><tspan x="1095.0" dy="26">记录时长、内容、支付方式、设备</tspan></text><rect x="820" y="474" rx="18" ry="18" width="550" height="88" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/><text x="1095.0" y="505.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B4. 异常场景一：支付成功未开局</tspan><tspan x="1095.0" dy="26">自动转异常订单，待补开局或退款</tspan></text><rect x="820" y="592" rx="18" ry="18" width="550" height="88" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/><text x="1095.0" y="623.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B5. 异常场景二：中途退出 / 人工强停</tspan><tspan x="1095.0" dy="26">根据规则处理，不退款或进入人工复核</tspan></text><rect x="820" y="710" rx="18" ry="18" width="550" height="88" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/><text x="1095.0" y="741.0" font-family="Arial Unicode MS, Arial" font-size="20" font-weight="600" text-anchor="middle" dominant-baseline="middle" fill="#0F172A"><tspan x="1095.0" dy="0">B6. 退款闭环</tspan><tspan x="1095.0" dy="26">未结算走原路退回；已结算走线下退款+凭证</tspan></text><line x1="330" y1="208" x2="330" y2="238" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1095" y1="208" x2="1095" y2="238" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="330" y1="326" x2="330" y2="356" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1095" y1="326" x2="1095" y2="356" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="330" y1="444" x2="330" y2="474" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1095" y1="444" x2="1095" y2="474" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="330" y1="562" x2="330" y2="592" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1095" y1="562" x2="1095" y2="592" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="330" y1="680" x2="330" y2="710" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="1095" y1="680" x2="1095" y2="710" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><line x1="590" y1="605" x2="820" y2="165" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><rect x="613.0" y="353.0" width="184" height="28" rx="8" fill="#DBEAFE" stroke="#93C5FD"/><text x="705.0" y="371.0" font-family="Arial Unicode MS, Arial" font-size="16" text-anchor="middle" fill="#1E3A8A">开局成功</text><line x1="590" y1="487" x2="820" y2="515" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/><rect x="613.0" y="469.0" width="184" height="28" rx="8" fill="#DBEAFE" stroke="#93C5FD"/><text x="705.0" y="487.0" font-family="Arial Unicode MS, Arial" font-size="16" text-anchor="middle" fill="#1E3A8A">扣款成功但开局失败</text><text x="70" y="840" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">闭环要求：</text><text x="70" y="870" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">1. 扫码成功不等于支付成功，必须经过会员识别、资产校验、确认扣款。</text><text x="70" y="900" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">2. 扣款成功不等于业务完成，必须继续校验开局结果。</text><text x="70" y="930" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">3. 结束时必须有结束原因；异常结束要进入异常订单或退款流程。</text><text x="70" y="960" font-family="Arial Unicode MS, Arial" font-size="20" fill="#475569">4. 退款必须能回溯到订单、支付方式、设备、操作人和退款凭证。</text></svg>